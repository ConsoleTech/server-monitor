name: Server TCP Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check_tcp:
    runs-on: ubuntu-latest
    steps:
      - name: Check HTTP port
        run: |
          if ! nc -zv YOUR_SERVER_IP 80; then
            echo "Server port 80 is down!"
            exit 1
          else
            echo "Server is up ✅"
          fi
